<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient (Forest Green to Teal) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d3025" />
      <stop offset="50%" stop-color="#1b4d3e" />
      <stop offset="100%" stop-color="#2d7a64" />
    </linearGradient>
    
    <!-- Accent Gradient for the Music Note -->
    <linearGradient id="noteGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e0f2fe" />
    </linearGradient>

    <!-- Subtle Drop Shadow for the Note -->
    <filter id="dropShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Round Container with smooth corners -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Choral Waves / Soundwave underlay -->
  <path d="M96 280 Q 144 200, 192 280 T 288 280 T 384 280 T 416 280" fill="none" stroke="#2d7a64" stroke-width="12" stroke-linecap="round" opacity="0.4" />
  <path d="M96 320 Q 144 260, 192 320 T 288 320 T 384 320 T 416 320" fill="none" stroke="#2d7a64" stroke-width="8" stroke-linecap="round" opacity="0.3" />

  <!-- Stylized Double Eighth Note (Choral/Singing Theme) -->
  <g filter="url(#dropShadow)">
    <!-- Left Note Head -->
    <ellipse cx="180" cy="340" rx="45" ry="32" transform="rotate(-15 180 340)" fill="url(#noteGrad)" />
    <!-- Right Note Head -->
    <ellipse cx="340" cy="300" rx="45" ry="32" transform="rotate(-15 340 300)" fill="url(#noteGrad)" />
    
    <!-- Stems -->
    <rect x="210" y="140" width="16" height="200" rx="8" fill="url(#noteGrad)" />
    <rect x="370" y="100" width="16" height="200" rx="8" fill="url(#noteGrad)" />
    
    <!-- Beam -->
    <path d="M210 140 L386 100 L386 136 L210 176 Z" fill="url(#noteGrad)" />
  </g>
</svg>