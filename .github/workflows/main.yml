name: Deploy to PocketHost

on:
  push:
    branches:
      - main  # Adjust branch if needed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies and audit
        run: |
          npm ci
          npm audit --audit-level=high

      - name: Build frontend
        run: npm run build

      - name: Prepare deployment structure
        run: |
          mkdir -p deploy
          # Move frontend build to pb_public
          cp -r dist deploy/pb_public
          # Copy PocketBase migrations and hooks if they exist
          if [ -d "pocketbase/pb_migrations" ]; then
            cp -r pocketbase/pb_migrations deploy/pb_migrations
          fi
          if [ -d "pocketbase/pb_hooks" ]; then
            cp -r pocketbase/pb_hooks deploy/pb_hooks
          fi

      - name: Deploy to PocketHost via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ftp.pockethost.io
          username: ${{ secrets.POCKETHOST_USERNAME }}
          password: ${{ secrets.POCKETHOST_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./deploy/
          # REPLACE with your actual PocketHost instance subdomain (e.g., /my-choir-app/)
          server-dir: /choir-manager/

      - name: Verify deployed PocketBase hook fingerprint
        shell: bash
        run: |
          set -euo pipefail
          expected_fingerprint="$(node -e 'const fs = require("fs"); const source = fs.readFileSync("pocketbase/pb_hooks/main.pb.js", "utf8"); const match = source.match(/fingerprint: "([a-f0-9]{16})"/); if (!match) process.exit(1); process.stdout.write(match[1]);')"

          for attempt in $(seq 1 18); do
            if EXPECTED_HOOK_FINGERPRINT="$expected_fingerprint" node --input-type=module -e '
              const response = await fetch("https://choir-manager.pockethost.io/api/hooks/health", {
                headers: { Accept: "application/json" },
              });
              const body = await response.json().catch(() => null);
              if (!response.ok || body?.ok !== true || body?.fingerprint !== process.env.EXPECTED_HOOK_FINGERPRINT) {
                process.exit(1);
              }
            '; then
              echo "PocketHost loaded hook fingerprint $expected_fingerprint"
              exit 0
            fi

            echo "Waiting for PocketHost to reload custom hooks ($attempt/18)..."
            sleep 5
          done

          echo "::error::PocketHost did not load hook fingerprint $expected_fingerprint. Restart the instance, then rerun this workflow."
          exit 1
